spring.application.name=idcard

# Avoid port conflict with Jenkins on 8080
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/idcard_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf (disable cache for dev)
spring.thymeleaf.cache=false

# Photo upload config
app.photo.upload-dir=uploads/photos
app.photo.allowed-types=image/jpeg,image/png
app.photo.max-size=5242880
