# SQLite test database
spring.datasource.url=jdbc:sqlite:test-db.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.sql.init.mode=never

# Photo upload config (required by PhotoStorageService)
app.photo.upload-dir=uploads/photos
app.photo.allowed-types=image/jpeg,image/png
app.photo.max-size=5242880
