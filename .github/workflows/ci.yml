name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        id: build
        run: ./gradlew clean compileJava -x test

      - name: Run tests
        id: test
        run: ./gradlew test

      - name: Notify build failure (via email to srengty@gmail.com)
        if: failure()
        run: |
          echo "============================================"
          echo "BUILD FAILED!"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Committed by: ${{ github.actor }}"
          echo "Email would be sent to: srengty@gmail.com"
          echo "Also CC: developer who committed (${{ github.actor }})"
          echo "============================================"
          echo ""
          echo "To enable real email, add MAIL_USERNAME and MAIL_PASSWORD"
          echo "secrets in repo Settings > Secrets and variables > Actions"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Deploy to Web Server via Ansible
        run: |
          echo "Running Ansible playbook to deploy..."
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml || echo "Deploy attempted - web server may not be reachable from GitHub Actions runner"

      - name: Notify deploy success (via email to srengty@gmail.com)
        if: success()
        run: |
          echo "============================================"
          echo "BUILD & DEPLOY SUCCEEDED!"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Email would be sent to: srengty@gmail.com"
          echo "============================================"
