name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        id: build
        run: ./gradlew clean compileJava -x test

      - name: Run tests
        id: test
        run: ./gradlew test

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BUILD FAILED: ${{ github.repository }} - ${{ github.sha }}"
          to: srengty@gmail.com
          from: CI Pipeline
          body: |
            Build failed on commit: ${{ github.sha }}
            Repository: ${{ github.repository }}
            Commit by: ${{ github.actor }}
            See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Deploy to Web Server via Ansible
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml || echo "Deploy attempted - web server may not be reachable from GitHub Actions"

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BUILD SUCCESS: ${{ github.repository }}"
          to: srengty@gmail.com
          from: CI Pipeline
          body: |
            Build & Deploy succeeded!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
